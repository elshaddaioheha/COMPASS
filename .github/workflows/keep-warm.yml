name: Keep backend warm

# Pings the backend /health to keep Render's free tier from sleeping.
#
# The scheduled trigger is intentionally DISABLED — UptimeRobot handles the
# regular keep-warm pings instead (GitHub's cron is often delayed past Render's
# 15-min sleep window, so it's unreliable for this). This workflow is kept as a
# manual backup only. To re-enable automatic pings, uncomment the `schedule:`
# block below.
#
# Optional: override the target by setting a BACKEND_URL repo variable
# (Settings → Secrets and variables → Actions → Variables).

on:
  # schedule:
  #   - cron: "*/10 * * * *"   # every 10 min (UTC) — re-enable to auto-run
  workflow_dispatch: {} # run manually from the Actions tab

# Don't pile up overlapping pings if a run is slow (cold start).
concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend /health
        env:
          # Defaults to the current Render URL; override with a BACKEND_URL repo
          # variable if the backend URL changes.
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://compass-backend-bgej.onrender.com' }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::warning::BACKEND_URL repo variable is not set — skipping."
            echo "Add it under Settings → Secrets and variables → Actions → Variables."
            exit 0
          fi

          url="${BACKEND_URL%/}/health"
          echo "Pinging $url ..."
          # --max-time 90 tolerates a full cold start (~50-60s).
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$url" || echo "000")
          echo "HTTP $code"

          # 200 = healthy, 503 = degraded (Redis/Mongo down) but the server is
          # awake and responding. Either means the dyno is no longer asleep.
          if [ "$code" = "200" ] || [ "$code" = "503" ]; then
            echo "Backend is awake."
          else
            echo "::error::Backend ping returned $code"
            exit 1
          fi
